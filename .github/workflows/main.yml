name: Build and Release APK

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub

jobs:
  build:
    name: Build and Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.x'

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: /opt/hostedtoolcache/flutter
          key: flutter-${{ runner.os }}-${{ hashFiles('pubspec.yaml') }}
          restore-keys: flutter-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Versión detectada: $VERSION"

      - name: Build APK (armeabi-v7a)
        run: flutter build apk --release --target-platform android-arm

      - name: Build APK (arm64-v8a)
        run: flutter build apk --release --target-platform android-arm64

      - name: Build APK (x86_64)
        run: flutter build apk --release --target-platform android-x64

      - name: Rename APKs for release
        run: |
          mkdir -p release_apks
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk release_apks/ContadorPPL-v${{ env.VERSION }}-armeabi-v7a.apk
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk release_apks/ContadorPPL-v${{ env.VERSION }}-arm64-v8a.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk release_apks/ContadorPPL-v${{ env.VERSION }}-x86_64.apk
          ls -la release_apks/

      - name: Create/Update Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "release_apks/*.apk"
          tag: v${{ env.VERSION }}
          name: "ContadorPPL v${{ env.VERSION }}"
          body: |
            ## 📱 ContadorPPL Dashboard v${{ env.VERSION }}

            🚀 Build automático desde la rama `${{ github.ref_name }}`

            ### 📦 Descargas (elige según tu dispositivo):
            - **arm64-v8a** → Para la mayoría de teléfonos modernos
            - **armeabi-v7a** → Para dispositivos más antiguos (32-bit)
            - **x86_64** → Para emuladores

            ### 📝 Cambios:
            - Consulta el historial de commits para ver los cambios
          token: ${{ secrets.TOKEN }}
          allowUpdates: true
          removeArtifacts: true
          makeLatest: true

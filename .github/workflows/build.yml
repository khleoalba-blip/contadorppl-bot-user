name: Build and Release APK

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'flutter_dashboard/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build and Release APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: flutter_dashboard

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.x'

      - name: Install dependencies
        run: flutter pub get

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Version: $VERSION"

      - name: Build APK (armeabi-v7a)
        run: flutter build apk --release --target-platform android-arm

      - name: Build APK (arm64-v8a)
        run: flutter build apk --release --target-platform android-arm64

      - name: Build APK (x86_64)
        run: flutter build apk --release --target-platform android-x64

      - name: Package APKs for release
        run: |
          mkdir -p release_apks
          # Buscar todos los APKs generados
          echo "=== APKs generados ==="
          find build/app/outputs/flutter-apk/ -name "*.apk" -ls
          # Copiar con nombres descriptivos
          ls build/app/outputs/flutter-apk/
          for apk in build/app/outputs/flutter-apk/*.apk; do
            base=$(basename "$apk")
            cp "$apk" "release_apks/ContadorPPL-v$VERSION-$base"
          done
          echo "=== APKs empaquetados ==="
          ls -la release_apks/

      - name: Create/Update Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "flutter_dashboard/release_apks/*.apk"
          tag: v${{ env.VERSION }}
          name: "ContadorPPL v${{ env.VERSION }}"
          body: |
            ## 📱 ContadorPPL Dashboard v${{ env.VERSION }}

            🚀 Build automático desde la rama `${{ github.ref_name }}`

            ### 📦 Descargas:
            - **arm64-v8a** → Telefonos modernos
            - **armeabi-v7a** → Dispositivos 32-bit
            - **x86_64** → Emuladores

            ### 📝 Cambios:
            - Consulta el historial de commits
          token: ${{ secrets.TOKEN }}
          allowUpdates: true
          removeArtifacts: true
          makeLatest: true
